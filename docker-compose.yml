services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-file:./dev.db}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      GIN_MODE: ${GIN_MODE:-release}
      PORT: "8080"
    volumes:
      # Persist local SQLite DB during development
      - ./data:/app/data
    restart: unless-stopped
